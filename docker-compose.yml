version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freelance_market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  analyzer:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/freelance_market
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/freelance_market
      LOG_LEVEL: DEBUG
    volumes:
      - ./exports:/app/exports
      - ./reports/charts:/app/reports/charts
      - ./logs:/app/logs
    command: python main.py

volumes:
  postgres_data:
